substitutions:
  device_name: pet-feeder
  topic_prefix: wifi2mqtt/pet-feeder

esphome:
  name: ${device_name}
  friendly_name: Pet Feeder
  on_boot:
    priority: -100
    then:
      - output.turn_off: mcu_en_pin
      - logger.log:
          level: INFO
          format: "Boot: EN pin LOW"
      - lambda: |-
          id(mcu_ready) = false;
          id(mcu_connected) = false;
          id(mcu_heartbeat_seen) = false;
          id(feeding_active) = false;
          id(last_feed_millis) = 0;

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: DEBUG

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Stockholm
    servers:
      - pool.ntp.org
      - time.google.com
    on_time_sync:
      then:
        - logger.log:
            level: INFO
            format: "SNTP time synchronised"

ota:
  - platform: esphome
    password: !secret ota_pet_feeder_password

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  reboot_timeout: 3min
  ap:
    ssid: "Pet-Feeder Fallback"
    password: !secret ap_password

captive_portal:

mqtt:
  broker: !secret mqtt_broker
  port: !secret mqtt_port
  username: !secret mqtt_user
  password: !secret mqtt_password
  client_id: ${device_name}
  topic_prefix: ${topic_prefix}
  discovery: true
  birth_message:
    topic: ${topic_prefix}/availability
    payload: online
    retain: true
  will_message:
    topic: ${topic_prefix}/availability
    payload: offline
    retain: true
  on_connect:
    then:
      - mqtt.publish:
          topic: ${topic_prefix}/availability
          payload: "online"
          retain: true
      - lambda: id(feeder_sensor).publish_state("Idle");
      - lambda: id(mcu_sensor).publish_state("Disconnected");
      - lambda: id(lock_sensor).publish_state("Unlocked");
      - output.turn_on: mcu_en_pin
      - logger.log:
          level: INFO
          format: "EN pin HIGH — starting handshake"
      - delay: 1000ms
      - script.execute: do_handshake
  on_disconnect:
    then:
      - output.turn_off: mcu_en_pin
      - lambda: |-
          id(mcu_connected) = false;
          id(mcu_heartbeat_seen) = false;
          // mcu_ready intentionally NOT cleared — motor controller state survives
          // MQTT drops. Clearing it here causes feeds to fail after any network
          // blip because the idle MCU never resends DP4=0x00 unprompted.
  on_message:
    - topic: ${topic_prefix}/feedCmd
      then:
        - lambda: id(feed_retry_remaining) = -1;
        - script.execute:
            id: feed_script
            portions: !lambda "return atoi(x.c_str());"

# ── PIN ASSIGNMENTS (ESP32-C3 Super Mini → WBR3 footprint) ──────────────────
#
#  WBR3 pad   ESP32-C3    Direction   Function
#  ─────────  ─────────   ─────────   ────────────────────────────────────────
#  Pin  8     3V3         PWR         VCC — power supply
#  Pin  9     GND         PWR         Ground
#  Pin 15     GPIO21      ESP → MCU   UART TX  (WBR3 RXD — data to MCU)
#  Pin 16     GPIO20      MCU → ESP   UART RX  (WBR3 TXD — data from MCU)
#  Pin EN     GPIO10      ESP → MCU   Module ready signal
#                                     LOW at boot, HIGH after WiFi+MQTT connect
#                                     MCU waits for this before starting handshake
#
#  Notes:
#  - GPIO10 has no strapping pin restrictions on ESP32-C3 (safe for output use)
#  - GPIO20/21 are the recommended UART0 pins for ESP32-C3 with esp-idf
#  - All signals are 3.3V — no level shifting required
# ─────────────────────────────────────────────────────────────────────────────

uart:
  id: tuya_uart
  tx_pin: GPIO21
  rx_pin: GPIO20
  baud_rate: 9600

output:
  - platform: gpio
    id: mcu_en_pin
    pin:
      number: GPIO10
      mode:
        output: true

globals:
  - id: feeding_active
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: mcu_heartbeat_seen
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: mcu_connected
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: feeder_locked
    type: bool
    restore_value: yes
    initial_value: 'false'

  - id: mcu_ready
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: last_feed_millis
    type: uint32_t
    restore_value: no
    initial_value: '0'

  - id: feed_retry_remaining
    type: int
    restore_value: no
    initial_value: '-1'   # -1 = sentinel, not in a retry sequence

  - id: feed_portions_pending
    type: int
    restore_value: no
    initial_value: '1'

button:
  - platform: template
    name: "Dispense Meal"
    id: dispense_meal_button
    icon: "mdi:bowl"
    on_press:
      then:
        - lambda: id(feed_retry_remaining) = -1;
        - script.execute:
            id: feed_script
            portions: !lambda "return (int)id(portion_size).state;"

number:
  - platform: template
    name: "Feed Max Retries"
    id: feed_max_retries
    icon: "mdi:repeat"
    entity_category: config
    min_value: 0
    max_value: 5
    step: 1
    restore_value: yes
    initial_value: 3
    optimistic: true

  - platform: template
    name: "Portion Size"
    id: portion_size
    icon: "mdi:scale"
    entity_category: config
    min_value: 1
    max_value: 12
    step: 1
    restore_value: yes
    initial_value: 1
    optimistic: true

sensor:
  - platform: wifi_signal
    name: "RSSI"
    id: rssi_sensor
    icon: "mdi:access-point"
    entity_category: diagnostic
    update_interval: 60s
    on_value:
      then:
        - mqtt.publish:
            topic: ${topic_prefix}/rssi
            payload: !lambda "return to_string((int)x);"
            retain: true

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP"
      id: ip_sensor
      icon: "mdi:ip-network"
      entity_category: diagnostic
      on_value:
        then:
          - mqtt.publish:
              topic: ${topic_prefix}/ip
              payload: !lambda "return x;"

  - platform: template
    name: "Feeder Status"
    id: feeder_sensor
    icon: "mdi:bowl"
    state_topic: ${topic_prefix}/feeder

  - platform: template
    name: "MCU Status"
    id: mcu_sensor
    icon: "mdi:chip"
    entity_category: diagnostic
    state_topic: ${topic_prefix}/mcu

  - platform: template
    name: "Lock Status"
    id: lock_sensor
    icon: "mdi:lock"
    state_topic: ${topic_prefix}/lock

  - platform: template
    name: "Last Error"
    id: last_error_sensor
    icon: "mdi:alert-circle"
    entity_category: diagnostic
    state_topic: ${topic_prefix}/last_error

script:
  # ── Tuya handshake ────────────────────────────────────────────────────────
  # Sequence confirmed from WBR3 startup capture.
  # WBR3 always sends v0 frames (55 AA 00 ...) to MCU.
  # MCU responds with v3 frames (55 AA 03 ...).
  - id: do_handshake
    mode: restart
    then:
      - logger.log: "Sending full handshake sequence"
      - uart.write: [0x55, 0xAA, 0x00, 0x00, 0x00, 0x00, 0xFF]
      - delay: 200ms
      - uart.write: [0x55, 0xAA, 0x00, 0x01, 0x00, 0x00, 0x00]
      - delay: 200ms
      - uart.write: [0x55, 0xAA, 0x00, 0x02, 0x00, 0x00, 0x01]
      - delay: 200ms
      - uart.write: [0x55, 0xAA, 0x00, 0x03, 0x00, 0x01, 0x04, 0x07]
      - delay: 200ms
      - uart.write: [0x55, 0xAA, 0x00, 0x08, 0x00, 0x00, 0x07]
      - delay: 200ms
      - uart.write: [0x55, 0xAA, 0x00, 0x34, 0x00, 0x02, 0x0B, 0x00, 0x40]
      - delay: 200ms
      - uart.write: [0x55, 0xAA, 0x00, 0x34, 0x00, 0x02, 0x0B, 0x00, 0x40]
      - delay: 500ms
      - logger.log: "Handshake frames sent — waiting for CMD01 confirmation"

  # ── MCU ready fallback ────────────────────────────────────────────────────
  # Fires 8s after CMD01. If DP4=0x00 never arrived (MCU already idle when
  # we connected — no state change to report), assume motor is initialised.
  # mode: restart resets the 8s window if CMD01 fires again during a retry.
  - id: mcu_ready_fallback
    mode: restart
    then:
      - delay: 8s
      - if:
          condition:
            lambda: "return id(mcu_connected) && !id(mcu_ready);"
          then:
            - lambda: |-
                id(mcu_ready) = true;
                id(mcu_sensor).publish_state("Connected");
                ESP_LOGI("tuya", "MCU ready — assumed idle (no DP4=0 received after 8s)");

  # ── MCU reset and retry ───────────────────────────────────────────────────
  # Called from feed_script timeout path when retries remain.
  # Cycles the EN pin to force the MCU to re-initialise its UART state,
  # waits for mcu_ready, then re-fires the feed with the stored portions.
  # By the time this script calls feed_script.execute(), feed_script has
  # already terminated (it launched this script as its last action), so
  # mode: single allows the new execution.
  - id: mcu_reset_and_retry
    mode: single
    then:
      - logger.log:
          level: WARN
          format: "MCU reset — cycling EN pin to recover UART state"
      - output.turn_off: mcu_en_pin
      - lambda: |-
          id(mcu_connected) = false;
          id(mcu_ready) = false;
      - delay: 2s
      - output.turn_on: mcu_en_pin
      - delay: 1s
      - script.execute: do_handshake
      - wait_until:
          condition:
            lambda: "return id(mcu_ready);"
          timeout: 20s
      - script.execute:
          id: feed_script
          portions: !lambda "return id(feed_portions_pending);"

  # ── Feed script ───────────────────────────────────────────────────────────
  # Checksum verified from capture:
  #   n=1 → 0x17, n=2 → 0x18, n=4 → 0x1A  →  checksum = (0x16 + n) & 0xFF
  # Feeding done: MCU CMD 0x07 DP4=0x00, or CMD 0x34 DP11 extended report.
  - id: feed_script
    parameters:
      portions: int
    mode: single
    then:
      # On a fresh call (sentinel -1) initialise retry counter and store portions.
      # On a retry call from mcu_reset_and_retry the counter is already set.
      - lambda: |-
          if (id(feed_retry_remaining) < 0) {
            id(feed_retry_remaining) = (int)id(feed_max_retries).state;
            id(feed_portions_pending) = portions;
          }
      # Guard: 30s cooldown between feeds — skipped on retries (same feed cycle).
      # Condition returns true when blocked → script.stop fires from then: block.
      # script.stop only works reliably from a child then: block, not inline.
      - if:
          condition:
            lambda: |-
              if (id(feed_retry_remaining) < (int)id(feed_max_retries).state)
                return false;  // retry — skip cooldown
              uint32_t now = millis();
              return id(last_feed_millis) > 0 && (now - id(last_feed_millis)) < 30000;
          then:
            - lambda: |-
                uint32_t remaining = 30000 - (millis() - id(last_feed_millis));
                ESP_LOGW("main", "Feed blocked — cooldown (%us remaining)", remaining / 1000);
                id(feed_retry_remaining) = -1;
                id(feeder_sensor).publish_state("Error");
            - mqtt.publish:
                topic: ${topic_prefix}/last_error
                payload: !lambda |-
                  auto t = id(sntp_time).now();
                  uint32_t remaining = 30000 - (millis() - id(last_feed_millis));
                  char msg[80];
                  if (t.is_valid())
                    snprintf(msg, sizeof(msg), "[%02d:%02d:%02d] Feed blocked — %us cooldown remaining",
                             t.hour, t.minute, t.second, remaining / 1000);
                  else
                    snprintf(msg, sizeof(msg), "Feed blocked — %us cooldown remaining", remaining / 1000);
                  return std::string(msg);
                retain: true
            - script.stop: feed_script
      # Guard: wait for MCU motor controller ready (DP4=0 in startup dump).
      # After a full power cycle CMD01 arrives fast but motor init takes longer.
      - wait_until:
          condition:
            lambda: "return id(mcu_ready);"
          timeout: 15s
      # If still not ready — run a handshake reset and wait once more.
      # This recovers from MQTT reconnect cases where the idle MCU never
      # resent DP4=0x00, and the mcu_ready_fallback hasn't fired yet.
      - if:
          condition:
            lambda: "return !id(mcu_ready);"
          then:
            - logger.log:
                level: WARN
                format: "MCU not ready after 15s — handshake reset, retrying once"
            - script.execute: do_handshake
            - wait_until:
                condition:
                  lambda: "return id(mcu_ready);"
                timeout: 15s
      - if:
          condition:
            lambda: "return !id(mcu_ready);"
          then:
            - logger.log:
                level: WARN
                format: "MCU not ready — feed aborted after retry"
            - lambda: |-
                id(feed_retry_remaining) = -1;
                id(feeder_sensor).publish_state("Error");
            - mqtt.publish:
                topic: ${topic_prefix}/last_error
                payload: !lambda |-
                  auto t = id(sntp_time).now();
                  char msg[80];
                  if (t.is_valid())
                    snprintf(msg, sizeof(msg), "[%02d:%02d:%02d] MCU not ready — motor not initialised after retry",
                             t.hour, t.minute, t.second);
                  else
                    snprintf(msg, sizeof(msg), "MCU not ready — motor not initialised after retry");
                  return std::string(msg);
                retain: true
            - script.stop: feed_script
      # All guards passed — send feed
      - lambda: |-
          id(last_feed_millis) = millis();
          id(feeder_sensor).publish_state("Feeding");
      - lambda: |-
          int n = portions;
          if (n < 1) n = 1;
          if (n > 12) n = 12;
          uint8_t checksum = (0x16 + n) & 0xFF;
          uint8_t frame[] = {
            0x55, 0xAA, 0x00, 0x06, 0x00, 0x08,
            0x03, 0x02, 0x00, 0x04,
            0x00, 0x00, 0x00, (uint8_t)n,
            checksum
          };
          id(tuya_uart).write_array(frame, sizeof(frame));
          id(feeding_active) = true;
          ESP_LOGI("tuya", "Feed frame sent: %d portions checksum=0x%02X", n, checksum);
          // Send CMD34 DP11 ack immediately after CMD06, exactly as WBR3 does.
          // WBR3 sends this proactively right after the feed command, NOT after
          // receiving CMD34 from the MCU. The MCU appears to require this ack
          // before it will start the motor.
          uint8_t ack[] = {0x55, 0xAA, 0x00, 0x34, 0x00, 0x02, 0x0B, 0x00, 0x40};
          id(tuya_uart).write_array(ack, sizeof(ack));
          ESP_LOGV("tuya", "CMD34 DP11 ack sent (proactive, after CMD06)");
      # Wait for RX poll to clear feeding_active. Exits immediately when done.
      # 30s timeout — normal feeds complete in ~14s.
      - wait_until:
          condition:
            lambda: "return !id(feeding_active);"
          timeout: 30s
      - if:
          condition:
            lambda: "return id(feeding_active);"
          then:
            - lambda: |-
                id(feeding_active) = false;
                id(mcu_connected) = false;
                id(feeder_sensor).publish_state("Error");
            - logger.log:
                level: WARN
                format: "Feed timeout — no done signal from MCU"
            - if:
                condition:
                  lambda: "return id(feed_retry_remaining) > 0;"
                then:
                  - lambda: |-
                      id(feed_retry_remaining)--;
                      ESP_LOGW("main", "Feed timeout — resetting MCU, %d retries remaining",
                               id(feed_retry_remaining));
                  - mqtt.publish:
                      topic: ${topic_prefix}/last_error
                      payload: !lambda |-
                        auto t = id(sntp_time).now();
                        char msg[80];
                        if (t.is_valid())
                          snprintf(msg, sizeof(msg), "[%02d:%02d:%02d] Feed timeout — retrying (%d left)",
                                   t.hour, t.minute, t.second, id(feed_retry_remaining));
                        else
                          snprintf(msg, sizeof(msg), "Feed timeout — retrying (%d left)",
                                   id(feed_retry_remaining));
                        return std::string(msg);
                      retain: true
                  - script.execute: mcu_reset_and_retry
                else:
                  - lambda: id(feed_retry_remaining) = -1;
                  - mqtt.publish:
                      topic: ${topic_prefix}/last_error
                      payload: !lambda |-
                        auto t = id(sntp_time).now();
                        char msg[80];
                        if (t.is_valid())
                          snprintf(msg, sizeof(msg), "[%02d:%02d:%02d] Feed failed — all retries exhausted",
                                   t.hour, t.minute, t.second);
                        else
                          snprintf(msg, sizeof(msg), "Feed failed — all retries exhausted");
                        return std::string(msg);
                      retain: true

interval:
  - interval: 30s
    then:
      - mqtt.publish:
          topic: ${topic_prefix}/availability
          payload: "online"
          retain: true

  - interval: 5s
    then:
      - if:
          condition:
            lambda: "return !id(mcu_connected) && !id(do_handshake).is_running();"
          then:
            - logger.log:
                level: WARN
                format: "MCU not connected — retrying handshake"
            - script.execute: do_handshake

  # ── UART RX poll (100ms) ──────────────────────────────────────────────────
  # MCU sends Tuya v3 frames (55 AA 03 ...).
  # We always reply with v0 frames (55 AA 00 ...) — MCU accepts this.
  #
  # Key frames from capture:
  #   CMD 0x00 — heartbeat       (reply with 55 AA 00 00 00 00 FF)
  #   CMD 0x01 — product info    (MCU sends its ID string, no reply needed)
  #   CMD 0x02 — MCU state       (current DP dump, no reply needed)
  #   CMD 0x07 — DP status report
  #     DP4  (0x04): 0x00=idle/done, 0x01=scheduled, 0x02=feeding
  #     DP25 (0x19): 0x00=unlocked, 0x01=locked
  #   CMD 0x08 — MCU ack to our CMD 0x08 (no action needed)
  #   CMD 0x1C — time sync request from MCU (reply with current unix time)
  #   CMD 0x34 — extended feeding log (contains DP11 record with timestamp)
  - interval: 100ms
    then:
      - lambda: |-
          static std::vector<uint8_t> buf;
          while (id(tuya_uart).available()) {
            uint8_t b;
            id(tuya_uart).read_byte(&b);
            buf.push_back(b);
          }

          while (buf.size() >= 6) {
            if (buf[0] != 0x55 || buf[1] != 0xAA) {
              buf.erase(buf.begin());
              continue;
            }

            uint8_t  cmd         = buf[3];
            uint16_t payload_len = (buf[4] << 8) | buf[5];
            uint16_t full_len    = 6 + payload_len + 1;

            if (buf.size() < full_len) break;

            // ── CMD 0x00 Heartbeat ───────────────────────────────────────
            if (cmd == 0x00) {
              uint8_t hb[] = {0x55, 0xAA, 0x00, 0x00, 0x00, 0x00, 0xFF};
              id(tuya_uart).write_array(hb, sizeof(hb));
              if (!id(mcu_heartbeat_seen)) {
                id(mcu_heartbeat_seen) = true;
                ESP_LOGD("tuya", "First heartbeat received");
              }
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x01 Product info from MCU ──────────────────────────
            if (cmd == 0x01) {
              ESP_LOGD("tuya", "CMD01 product info received (%d bytes)", payload_len);
              id(mcu_connected) = true;
              if (!id(mcu_ready)) {
                // Motor controller not yet confirmed — show Initialising and
                // start fallback timer. If DP4=0x00 arrives first it wins;
                // otherwise the fallback sets ready after 8s.
                id(mcu_sensor).publish_state("Initialising");
                id(mcu_ready_fallback).execute();
                ESP_LOGI("tuya", "MCU connected — waiting for motor controller ready");
              } else {
                id(mcu_sensor).publish_state("Connected");
                ESP_LOGI("tuya", "MCU connected");
              }
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x02 MCU state report ────────────────────────────────
            if (cmd == 0x02) {
              ESP_LOGD("tuya", "CMD02 MCU state report (%d bytes)", payload_len);
              uint16_t pos = 6;
              while (pos + 4 < full_len) {
                uint8_t dp_id   = buf[pos];
                uint8_t dp_type = buf[pos+1];
                uint16_t dp_len = (buf[pos+2] << 8) | buf[pos+3];
                if (pos + 4 + dp_len > full_len) break;
                uint8_t dp_val  = buf[pos+4];
                if (dp_id == 0x19 && dp_len >= 1) {
                  bool locked = (dp_val == 0x01);
                  id(feeder_locked) = locked;
                  id(lock_sensor).publish_state(locked ? "Locked" : "Unlocked");
                  ESP_LOGD("tuya", "CMD02 lock state: %s", locked ? "LOCKED" : "UNLOCKED");
                }
                pos += 4 + dp_len;
              }
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x03 WiFi status query ───────────────────────────────
            if (cmd == 0x03) {
              uint8_t wifi_status[] = {0x55, 0xAA, 0x00, 0x03, 0x00, 0x01, 0x04, 0x07};
              id(tuya_uart).write_array(wifi_status, sizeof(wifi_status));
              ESP_LOGD("tuya", "CMD03 WiFi status query — replied cloud connected");
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x07 DP status report ────────────────────────────────
            if (cmd == 0x07 && payload_len >= 5 && buf.size() >= 7u + payload_len) {
              uint8_t dp_id    = buf[6];
              uint8_t dp_type  = buf[7];
              uint16_t val_len = (buf[8] << 8) | buf[9];
              uint8_t dp_val   = buf[10];
              uint32_t dp_val32 = 0;
              if (dp_type == 0x02 && val_len == 4 && buf.size() >= 14u) {
                dp_val32 = ((uint32_t)buf[10] << 24) | ((uint32_t)buf[11] << 16) |
                           ((uint32_t)buf[12] <<  8) |  (uint32_t)buf[13];
              }

              if (dp_type == 0x02 && val_len == 4)
                ESP_LOGD("tuya", "CMD07 DP%d type=0x%02X val32=%u", dp_id, dp_type, dp_val32);
              else
                ESP_LOGD("tuya", "CMD07 DP%d type=0x%02X val=0x%02X", dp_id, dp_type, dp_val);

              // DP3 = feed echo (MCU confirms it received the feed command via UART)
              if (dp_id == 0x03 && dp_type == 0x02 && val_len == 4)
                ESP_LOGI("tuya", "MCU echoed feed: %u portions", dp_val32);

              // DP4 = feeding motor state
              if (dp_id == 0x04) {
                if (dp_val == 0x01 && id(feeding_active))
                  ESP_LOGI("tuya", "Motor starting");
                if (dp_val == 0x00) {
                  if (id(feeding_active)) {
                    id(feeding_active) = false;
                    id(last_feed_millis) = millis();
                    id(feeder_sensor).publish_state("Idle");
                    ESP_LOGD("tuya", "Feeding done — DP4=0 (secondary signal)");
                    uint8_t ack[] = {0x55, 0xAA, 0x00, 0x34, 0x00, 0x02, 0x0B, 0x00, 0x40};
                    id(tuya_uart).write_array(ack, sizeof(ack));
                    ESP_LOGV("tuya", "CMD34 DP11 ack sent (DP4 path)");
                  }
                  if (!id(mcu_ready)) {
                    id(mcu_ready) = true;
                    id(mcu_sensor).publish_state("Connected");
                    ESP_LOGI("tuya", "MCU ready — motor controller initialised");
                  }
                }
              }

              // DP25 = lock state (display only — does not block UART feeds)
              if (dp_id == 0x19) {
                bool locked = (dp_val == 0x01);
                id(feeder_locked) = locked;
                id(lock_sensor).publish_state(locked ? "Locked" : "Unlocked");
                ESP_LOGD("tuya", "Lock: %s", locked ? "LOCKED" : "UNLOCKED");
              }

              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x08 MCU ack ─────────────────────────────────────────
            if (cmd == 0x08) {
              ESP_LOGV("tuya", "CMD08 ack from MCU");
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x1C Time sync request ───────────────────────────────
            if (cmd == 0x1C) {
              auto now = id(sntp_time).now();
              if (now.is_valid()) {
                uint32_t unix_time = (uint32_t)now.timestamp;
                // Derive UTC hour and local time fields for the 8-byte payload.
                // WBR3 capture confirms payload is always 8 bytes:
                //   [4B UTC unix] [local hour] [local min] [UTC offset hours] [UTC offset minutes]
                // Sending fewer bytes with len=8 in the header corrupts the MCU's UART
                // parser — it reads past the frame boundary every second.
                uint8_t utc_h = (uint8_t)((unix_time / 3600) % 24);
                uint8_t loc_h = (uint8_t)now.hour;
                uint8_t loc_m = (uint8_t)now.minute;
                uint8_t tz_h  = (uint8_t)((loc_h - utc_h + 24) % 24);
                uint8_t resp[15] = {
                  0x55, 0xAA, 0x00, 0x1C, 0x00, 0x08,
                  (uint8_t)(unix_time >> 24),
                  (uint8_t)(unix_time >> 16),
                  (uint8_t)(unix_time >>  8),
                  (uint8_t)(unix_time),
                  loc_h,
                  loc_m,
                  tz_h,
                  0x00,
                  0x00
                };
                uint8_t cs = 0;
                for (int i = 0; i < 14; i++) cs += resp[i];
                resp[14] = cs;
                id(tuya_uart).write_array(resp, 15);
                ESP_LOGV("tuya", "CMD1C time sync: unix=%u local=%02u:%02u tz=+%u cs=0x%02X",
                         unix_time, loc_h, loc_m, tz_h, cs);
              } else {
                // SNTP not yet synced — send zero payload (all 8 bytes).
                // Checksum 0x23 = (0x55+0xAA+0x1C+0x08) & 0xFF — unchanged
                // because the 8 zero payload bytes contribute nothing to the sum.
                uint8_t resp[] = {0x55, 0xAA, 0x00, 0x1C, 0x00, 0x08, 0,0,0,0, 0,0,0,0, 0x23};
                id(tuya_uart).write_array(resp, sizeof(resp));
                ESP_LOGV("tuya", "CMD1C time sync: SNTP not ready, sending zero");
              }
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x34 Extended feeding log ────────────────────────────
            if (cmd == 0x34 && payload_len >= 2) {
              uint8_t dp_id = buf[6];
              ESP_LOGD("tuya", "CMD34 DP%d extended report", dp_id);
              if (dp_id == 0x0B && id(feeding_active)) {
                id(feeding_active) = false;
                id(last_feed_millis) = millis();
                id(feeder_sensor).publish_state("Idle");
                ESP_LOGI("tuya", "Feeding done — CMD34 DP11");
                uint8_t ack[] = {0x55, 0xAA, 0x00, 0x34, 0x00, 0x02, 0x0B, 0x00, 0x40};
                id(tuya_uart).write_array(ack, sizeof(ack));
                ESP_LOGV("tuya", "CMD34 DP11 ack sent (CMD34 path)");
              }
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── Unknown ──────────────────────────────────────────────────
            ESP_LOGW("tuya", "Unknown CMD 0x%02X len=%d", cmd, payload_len);
            buf.erase(buf.begin(), buf.begin() + full_len);
          }
