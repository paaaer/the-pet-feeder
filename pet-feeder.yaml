substitutions:
  device_name: pet-feeder
  topic_prefix: wifi2mqtt/pet-feeder

esphome:
  name: ${device_name}
  friendly_name: Pet Feeder

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Pet-Feeder Fallback"
    password: !secret ap_password
  # NOTE: do NOT stop blink on wifi connect — wait for MQTT connect below

captive_portal:

mqtt:
  broker: !secret mqtt_broker
  port: !secret mqtt_port
  username: !secret mqtt_user
  password: !secret mqtt_password
  client_id: ${device_name}
  topic_prefix: ${topic_prefix}
  discovery: false
  birth_message:
    topic: ${topic_prefix}/availability
    payload: online
    retain: true
  will_message:
    topic: ${topic_prefix}/availability
    payload: offline
    retain: true
  on_connect:
    then:
      # LED LOW = connected and good
      - output.turn_on: status_led_output
      - mqtt.publish:
          topic: ${topic_prefix}/availability
          payload: "online"
          retain: true
      - mqtt.publish:
          topic: ${topic_prefix}/status
          payload: "Idle"
          retain: true
      - mqtt.publish:
          topic: ${topic_prefix}/locked
          payload: !lambda "return id(feeder_locked) ? \"ON\" : \"OFF\";"
          retain: true
  on_disconnect:
    then:
      # LED HIGH = not connected
      - output.turn_off: status_led_output
  on_message:
    - topic: ${topic_prefix}/feedCmd
      then:
        - if:
            condition:
              lambda: "return !id(feeder_locked);"
            then:
              - script.execute:
                  id: feed_script
                  portions: !lambda "return id(portion_size).state;"
    - topic: ${topic_prefix}/portion_size
      then:
        - lambda: |-
            id(portion_size).publish_state(atoi(x.c_str()));

# ── PIN ASSIGNMENTS (ESP32-C3 Super Mini — confirmed manufacturer pinout) ────
#  WBR3 pad   → C3 GPIO  Function
#  Pin 8 VCC  → 3V3      Power
#  Pin 9 GND  → GND      Ground
#  Pin 2 A_7  → GPIO21   Portion switch input
#  Pin 4 A_11 → GPIO4    Audio play output
#  Pin 5 A_2  → GPIO2    Motor relay output   ⚠ active-HIGH, strapping pin
#  Pin16 TXD  → GPIO5    Feed button input    (direct — no PCB bridge needed)
#  Pin10 A_12 → GPIO6    Status LED output    (GPIO15 on original ESP8266)
# ─────────────────────────────────────────────────────────────────────────────

globals:
  - id: play_recording
    type: bool
    restore_value: yes
    initial_value: 'true'

  - id: feed_count
    type: int
    restore_value: no
    initial_value: '0'

  - id: feeder_locked
    type: bool
    restore_value: yes
    initial_value: 'false'

output:
  - platform: gpio
    id: motor_output
    pin: GPIO2

  - platform: gpio
    id: play_output
    pin: GPIO4

  - platform: gpio
    id: status_led_output
    pin: GPIO6
    inverted: false

switch:
  - platform: output
    id: motor_switch
    name: "Motor"
    output: motor_output
    internal: true

  - platform: output
    id: play_switch
    name: "Play"
    output: play_output
    internal: true

  - platform: template
    name: "Recording"
    id: recording_switch
    icon: "mdi:account-voice"
    entity_category: config
    lambda: "return id(play_recording);"
    turn_on_action:
      - lambda: id(play_recording) = true;
      - mqtt.publish:
          topic: ${topic_prefix}/playStatus
          payload: "ON"
          retain: true
    turn_off_action:
      - lambda: id(play_recording) = false;
      - mqtt.publish:
          topic: ${topic_prefix}/playStatus
          payload: "OFF"
          retain: true

binary_sensor:
  # Portion counter — increments feed_count each time a portion passes
  - platform: gpio
    id: portion_switch
    pin:
      number: GPIO21
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Portion Switch"
    internal: true
    on_press:
      then:
        - lambda: "id(feed_count)++;"

  # Physical feed button (WBR3 pin 16 / TXD pad — direct wire, no PCB mod)
  # Short press        → feed one serving (if unlocked)
  # Long press ≥ 3s    → lock (single beep) / unlock (double beep) toggle
  - platform: gpio
    id: feed_button
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
      inverted: true
    name: "Feed Button"
    internal: true
    on_multi_click:
      # Short press: released within 800ms = one feed
      - timing:
          - ON for 20ms to 800ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: "return !id(feeder_locked);"
              then:
                - script.execute:
                    id: feed_script
                    portions: 1
      # Long press: held for at least 3 seconds = lock/unlock
      - timing:
          - ON for at least 3000ms
        then:
          - script.execute: lock_toggle_script

number:
  - platform: template
    name: "Portion Size"
    id: portion_size
    icon: "mdi:scale"
    entity_category: config
    min_value: 1
    max_value: 10
    step: 1
    restore_value: yes
    initial_value: 1
    optimistic: true
    on_value:
      then:
        - mqtt.publish:
            topic: ${topic_prefix}/portion_size
            payload: !lambda "return to_string((int)x);"
            retain: true

sensor:
  - platform: wifi_signal
    name: "RSSI"
    id: rssi_sensor
    icon: "mdi:access-point"
    entity_category: diagnostic
    update_interval: 60s
    on_value:
      then:
        - mqtt.publish:
            topic: ${topic_prefix}/rssi
            payload: !lambda "return to_string((int)x);"
            retain: true

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP"
      id: ip_sensor
      icon: "mdi:ip-network"
      entity_category: diagnostic
      on_value:
        then:
          - mqtt.publish:
              topic: ${topic_prefix}/ip
              payload: !lambda "return x;"

script:
  # Play audio beep (100ms pulse on A_11 pad)
  - id: play_script
    then:
      - switch.turn_on: play_switch
      - delay: 100ms
      - switch.turn_off: play_switch

  # Lock/unlock toggle — called from long press, non-blocking
  - id: lock_toggle_script
    mode: single
    then:
      - if:
          condition:
            lambda: "return id(feeder_locked);"
          then:
            # Currently locked → unlock: double beep
            - lambda: "id(feeder_locked) = false;"
            - script.execute: play_script
            - delay: 300ms
            - script.execute: play_script
            - mqtt.publish:
                topic: ${topic_prefix}/locked
                payload: "OFF"
                retain: true
            - mqtt.publish:
                topic: ${topic_prefix}/status
                payload: "Unlocked"
                retain: true
          else:
            # Currently unlocked → lock: single beep
            - lambda: "id(feeder_locked) = true;"
            - script.execute: play_script
            - mqtt.publish:
                topic: ${topic_prefix}/locked
                payload: "ON"
                retain: true
            - mqtt.publish:
                topic: ${topic_prefix}/status
                payload: "Locked"
                retain: true

  # Feed: runs motor until feed_count reaches target portions (max 5s timeout)
  - id: feed_script
    parameters:
      portions: int
    then:
      - mqtt.publish:
          topic: ${topic_prefix}/status
          payload: "Feeding"
          retain: true
      - if:
          condition:
            lambda: "return id(play_recording);"
          then:
            - script.execute: play_script
            - delay: 3s
      - switch.turn_on: motor_switch
      - lambda: "id(feed_count) = 0;"
      - wait_until:
          condition:
            lambda: "return id(feed_count) >= portions;"
          timeout: 5s
      - switch.turn_off: motor_switch
      - if:
          condition:
            lambda: "return id(feed_count) >= portions;"
          then:
            - mqtt.publish:
                topic: ${topic_prefix}/status
                payload: "Idle"
                retain: true
          else:
            - mqtt.publish:
                topic: ${topic_prefix}/status
                payload: "Error"
                retain: true

interval:
  - interval: 30s
    then:
      - mqtt.publish:
          topic: ${topic_prefix}/availability
          payload: "online"
          retain: true
