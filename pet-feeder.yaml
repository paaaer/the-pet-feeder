# ── DEBUG FLAG ────────────────────────────────────────────────────────────────
# Set mqtt_debug to "true" to publish debug messages to wifi2mqtt/pet-feeder/debug
# Set to "false" for normal operation to avoid MQTT spam
substitutions:
  device_name: pet-feeder
  topic_prefix: wifi2mqtt/pet-feeder
  mqtt_debug: "false"   # ← change to "true" to enable MQTT debug messages

esphome:
  name: ${device_name}
  friendly_name: Pet Feeder
  on_boot:
    priority: -100  # Runs after GPIO outputs are initialised
    then:
      # Hold EN LOW until MQTT connects.
      # On a full power cycle this creates the LOW→HIGH rising edge the MCU
      # needs to start sending heartbeats. On an ESP32-only reboot (OTA etc.)
      # the MCU ignores EN — the handshake is fired directly from on_connect.
      - output.turn_off: mcu_en_pin
      - logger.log: "Boot: EN pin LOW"

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

logger:
  level: DEBUG  # Set to VERBOSE for maximum serial output

time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Stockholm
    servers:
      - pool.ntp.org
      - time.google.com
    on_time_sync:
      then:
        - logger.log: "SNTP time synchronised"
    # Preventive ESP32 reboot every day at 04:00.
    # The MCU enters a state after ~22h of continuous UART communication
    # where it ignores feed commands. A reboot forces a full re-handshake
    # which resets the MCU UART state. 04:00 is well clear of both feed
    # times (06:15 and 17:00) so no feed is ever interrupted.
    on_time:
      - hours: 4
        minutes: 0
        seconds: 0
        then:
          - logger.log: "Scheduled daily reboot at 04:00 — pulling EN LOW to reset MCU"
          # Pull EN LOW first to reset the MCU completely, not just the UART state.
          # Hold LOW for 2s to ensure MCU fully powers down before ESP32 reboots.
          # On reboot, on_boot holds EN LOW, then on_connect drives it HIGH again
          # giving the MCU a clean rising edge as if it was a full power cycle.
          - output.turn_off: mcu_en_pin
          - delay: 2s
          - lambda: App.safe_reboot();


ota:
  - platform: esphome
    password: "e65a575ea5facec072c4c02ee4195dd6"

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
  fast_connect: true
  power_save_mode: none
  reboot_timeout: 3min
  ap:
    ssid: "Pet-Feeder Fallback"
    password: !secret ap_password

captive_portal:

mqtt:
  broker: !secret mqtt_broker
  port: !secret mqtt_port
  username: !secret mqtt_user
  password: !secret mqtt_password
  client_id: ${device_name}
  topic_prefix: ${topic_prefix}
  discovery: true
  birth_message:
    topic: ${topic_prefix}/availability
    payload: online
    retain: true
  will_message:
    topic: ${topic_prefix}/availability
    payload: offline
    retain: true
  on_connect:
    then:
      - mqtt.publish:
          topic: ${topic_prefix}/availability
          payload: "online"
          retain: true
      # Publish initial sensor states
      - lambda: id(feeder_sensor).publish_state("Idle");
      - lambda: id(mcu_sensor).publish_state("Disconnected");
      - lambda: id(lock_sensor).publish_state("Unlocked");
      # Drive EN HIGH — on a full power cycle this creates the rising edge
      # the MCU needs. On an ESP32-only reboot the MCU ignores EN but the
      # handshake below still works since we send the frames regardless.
      - output.turn_on: mcu_en_pin
      - logger.log: "EN pin HIGH — starting handshake"
      - delay: 1000ms
      - script.execute: do_handshake
  on_disconnect:
    then:
      - output.turn_off: mcu_en_pin
      - lambda: |-
          id(mcu_connected) = false;
          id(mcu_heartbeat_seen) = false;
          id(mcu_ready) = false;
  on_message:
    # Feed command from HA: payload = number of portions (1-12)
    - topic: ${topic_prefix}/feedCmd
      then:
        - script.execute:
            id: feed_script
            portions: !lambda "return atoi(x.c_str());"


# ── PIN ASSIGNMENTS (ESP32-C3 Super Mini → WBR3 footprint) ──────────────────
#
#  WBR3 pad   ESP32-C3    Direction   Function
#  ─────────  ─────────   ─────────   ────────────────────────────────────────
#  Pin  8     3V3         PWR         VCC — power supply
#  Pin  9     GND         PWR         Ground
#  Pin 15     GPIO21      ESP → MCU   UART TX  (WBR3 RXD — data to MCU)
#  Pin 16     GPIO20      MCU → ESP   UART RX  (WBR3 TXD — data from MCU)
#  Pin EN     GPIO10      ESP → MCU   Module ready signal
#                                     LOW at boot, HIGH after WiFi+MQTT connect
#                                     MCU waits for this before starting handshake
#
#  Notes:
#  - GPIO10 has no strapping pin restrictions on ESP32-C3 (safe for output use)
#  - GPIO20/21 are the recommended UART0 pins for ESP32-C3 with esp-idf
#  - All signals are 3.3V — no level shifting required
# ─────────────────────────────────────────────────────────────────────────────

uart:
  id: tuya_uart
  tx_pin: GPIO21
  rx_pin: GPIO20
  baud_rate: 9600

output:
  # EN pin: signals MCU that WiFi module is ready.
  # Driven LOW on boot via on_boot, HIGH in on_connect, LOW in on_disconnect.
  - platform: gpio
    id: mcu_en_pin
    pin:
      number: GPIO10
      mode:
        output: true

globals:
  - id: feeding_active
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: mcu_heartbeat_seen
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: mcu_connected
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: feeder_locked
    type: bool
    restore_value: yes
    initial_value: 'false'

  - id: mcu_ready
    # true after MCU sends DP4=0x00 in its startup state dump.
    # Motor controller is initialised and ready for feed commands.
    # Cleared on disconnect.
    type: bool
    restore_value: no
    initial_value: 'false'

button:
  - platform: template
    name: "Dispense Meal"
    id: dispense_meal_button
    icon: "mdi:bowl"
    on_press:
      then:
        - script.execute:
            id: feed_script
            portions: !lambda "return (int)id(portion_size).state;"

number:
  - platform: template
    name: "Portion Size"
    id: portion_size
    icon: "mdi:scale"
    entity_category: config
    min_value: 1
    max_value: 12
    step: 1
    restore_value: yes
    initial_value: 1
    optimistic: true

sensor:
  - platform: wifi_signal
    name: "RSSI"
    id: rssi_sensor
    icon: "mdi:access-point"
    entity_category: diagnostic
    update_interval: 60s
    on_value:
      then:
        - mqtt.publish:
            topic: ${topic_prefix}/rssi
            payload: !lambda "return to_string((int)x);"
            retain: true

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP"
      id: ip_sensor
      icon: "mdi:ip-network"
      entity_category: diagnostic
      on_value:
        then:
          - mqtt.publish:
              topic: ${topic_prefix}/ip
              payload: !lambda "return x;"

  - platform: template
    name: "Feeder Status"
    id: feeder_sensor
    icon: "mdi:bowl"
    state_topic: ${topic_prefix}/feeder

  - platform: template
    name: "MCU Status"
    id: mcu_sensor
    icon: "mdi:chip"
    entity_category: diagnostic
    state_topic: ${topic_prefix}/mcu

  - platform: template
    name: "Lock Status"
    id: lock_sensor
    icon: "mdi:lock"
    state_topic: ${topic_prefix}/lock

script:
  # ── Tuya handshake ────────────────────────────────────────────────────────
  # Sequence confirmed from WBR3 startup capture.
  # WBR3 always sends v0 frames (55 AA 00 ...) to MCU.
  # MCU responds with v3 frames (55 AA 03 ...).
  - id: do_handshake
    mode: restart
    then:
      - logger.log: "Sending full handshake sequence"
      - uart.write: [0x55, 0xAA, 0x00, 0x00, 0x00, 0x00, 0xFF]       # heartbeat
      - delay: 200ms
      - uart.write: [0x55, 0xAA, 0x00, 0x01, 0x00, 0x00, 0x00]       # product info query
      - delay: 200ms
      - uart.write: [0x55, 0xAA, 0x00, 0x02, 0x00, 0x00, 0x01]       # MCU state query
      - delay: 200ms
      - uart.write: [0x55, 0xAA, 0x00, 0x03, 0x00, 0x01, 0x04, 0x07] # WiFi: cloud connected
      - delay: 200ms
      - uart.write: [0x55, 0xAA, 0x00, 0x08, 0x00, 0x00, 0x07]       # CMD 0x08
      - delay: 200ms
      # CMD 0x34 DP11 ack — WBR3 sends this twice at startup.
      # Required to clear any pending feed state in MCU memory.
      - uart.write: [0x55, 0xAA, 0x00, 0x34, 0x00, 0x02, 0x0B, 0x00, 0x40]
      - delay: 200ms
      - uart.write: [0x55, 0xAA, 0x00, 0x34, 0x00, 0x02, 0x0B, 0x00, 0x40]
      - delay: 500ms
      - logger.log: "Handshake frames sent — waiting for CMD01 confirmation"

  # ── Feed script ───────────────────────────────────────────────────────────
  # Checksum verified from capture:
  #   n=1 → 0x17, n=2 → 0x18, n=4 → 0x1A  →  checksum = (0x16 + n) & 0xFF
  # Feeding done: MCU CMD 0x07 DP4=0x00, or CMD 0x34 DP11 extended report.
  - id: feed_script
    parameters:
      portions: int
    mode: single
    then:
      # Wait for MCU motor controller to be ready (DP4=0 received in startup dump).
      # After a full power cycle CMD01 arrives fast but motor init takes longer.
      - wait_until:
          condition:
            lambda: "return id(mcu_ready);"
          timeout: 15s
      - if:
          condition:
            lambda: "return !id(mcu_ready);"
          then:
            - logger.log: "MCU not ready — feed aborted, motor controller not initialised"
            - lambda: id(feeder_sensor).publish_state("Error");
            - script.stop: feed_script
      - lambda: id(feeder_sensor).publish_state("Feeding");
      - lambda: |-
          int n = portions;
          if (n < 1) n = 1;
          if (n > 12) n = 12;
          uint8_t checksum = (0x16 + n) & 0xFF;
          uint8_t frame[] = {
            0x55, 0xAA, 0x00, 0x06, 0x00, 0x08,
            0x03, 0x02, 0x00, 0x04,
            0x00, 0x00, 0x00, (uint8_t)n,
            checksum
          };
          id(tuya_uart).write_array(frame, sizeof(frame));
          id(feeding_active) = true;
          ESP_LOGI("tuya", "Feed frame sent: %d portions checksum=0x%02X", n, checksum);
          // Send CMD34 DP11 ack immediately after CMD06, exactly as WBR3 does.
          // WBR3 sends this proactively right after the feed command, NOT after
          // receiving CMD34 from the MCU. The MCU appears to require this ack
          // before it will start the motor.
          uint8_t ack[] = {0x55, 0xAA, 0x00, 0x34, 0x00, 0x02, 0x0B, 0x00, 0x40};
          id(tuya_uart).write_array(ack, sizeof(ack));
          ESP_LOGD("tuya", "CMD34 DP11 ack sent (proactive, after CMD06)");
          if ("${mqtt_debug}" == std::string("true")) {
            char msg[64];
            snprintf(msg, sizeof(msg), "Feed sent: %d portions checksum=0x%02X", n, checksum);
            mqtt::global_mqtt_client->publish(std::string("${topic_prefix}/debug"), std::string(msg), 0, false);
          }
      # Wait for RX poll to clear feeding_active. Exits immediately when done.
      # 30s timeout — normal feeds complete in ~14s.
      - wait_until:
          condition:
            lambda: "return !id(feeding_active);"
          timeout: 30s
      - if:
          condition:
            lambda: "return id(feeding_active);"
          then:
            - lambda: |-
                id(feeding_active) = false;
                id(mcu_connected) = false;
                id(feeder_sensor).publish_state("Error");
            - logger.log: "Feed timeout — no done signal from MCU, running handshake reset"
            - script.execute: do_handshake

interval:
  - interval: 30s
    then:
      - mqtt.publish:
          topic: ${topic_prefix}/availability
          payload: "online"
          retain: true

  - interval: 5s
    then:
      - if:
          condition:
            lambda: "return !id(mcu_connected) && !id(do_handshake).is_running();"
          then:
            - logger.log: "MCU not connected — retrying handshake"
            - script.execute: do_handshake

  # ── UART RX poll (100ms) ──────────────────────────────────────────────────
  # MCU sends Tuya v3 frames (55 AA 03 ...).
  # We always reply with v0 frames (55 AA 00 ...) — MCU accepts this.
  #
  # Key frames from capture:
  #   CMD 0x00 — heartbeat       (reply with 55 AA 00 00 00 00 FF)
  #   CMD 0x01 — product info    (MCU sends its ID string, no reply needed)
  #   CMD 0x02 — MCU state       (current DP dump, no reply needed)
  #   CMD 0x07 — DP status report
  #     DP4  (0x04): 0x00=idle/done, 0x01=scheduled, 0x02=feeding
  #     DP25 (0x19): 0x00=unlocked, 0x01=locked
  #   CMD 0x08 — MCU ack to our CMD 0x08 (no action needed)
  #   CMD 0x1C — time sync request from MCU (reply with current unix time)
  #   CMD 0x34 — extended feeding log (contains DP11 record with timestamp)
  - interval: 100ms
    then:
      - lambda: |-
          static std::vector<uint8_t> buf;
          while (id(tuya_uart).available()) {
            uint8_t b;
            id(tuya_uart).read_byte(&b);
            buf.push_back(b);
          }

          while (buf.size() >= 6) {
            // Sync to 55 AA header
            if (buf[0] != 0x55 || buf[1] != 0xAA) {
              buf.erase(buf.begin());
              continue;
            }

            uint8_t  cmd         = buf[3];
            uint16_t payload_len = (buf[4] << 8) | buf[5];
            uint16_t full_len    = 6 + payload_len + 1;

            if (buf.size() < full_len) break;

            // ── CMD 0x00 Heartbeat ───────────────────────────────────────
            if (cmd == 0x00) {
              uint8_t hb[] = {0x55, 0xAA, 0x00, 0x00, 0x00, 0x00, 0xFF};
              id(tuya_uart).write_array(hb, sizeof(hb));
              if (!id(mcu_heartbeat_seen)) {
                id(mcu_heartbeat_seen) = true;
                ESP_LOGD("tuya", "First heartbeat received");
              }
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x01 Product info from MCU ──────────────────────────
            // MCU sends this in response to our CMD 0x01 query during handshake.
            // This is the real confirmation the MCU received our handshake frames.
            if (cmd == 0x01) {
              if ("${mqtt_debug}" == std::string("true"))
                mqtt::global_mqtt_client->publish(std::string("${topic_prefix}/debug"), std::string("CMD01 product info received"), 0, false);
              ESP_LOGD("tuya", "CMD01 product info received (%d bytes)", payload_len);
              // Always set connected on CMD01 — no guard needed.
              // CMD01 can arrive before the handshake script finishes all frames
              // (MCU responds to frame 2 immediately), so a !mcu_connected guard
              // would miss it. Setting it unconditionally is safe and idempotent.
              id(mcu_connected) = true;
              id(mcu_sensor).publish_state("Connected");
              ESP_LOGD("tuya", "MCU connected — CMD01 confirmed");
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x02 MCU state report ────────────────────────────────
            if (cmd == 0x02) {
              // CMD02 is the MCU's full DP state dump — parse it to get real states
              // on startup rather than assuming defaults. Same DP structure as CMD07.
              ESP_LOGD("tuya", "CMD02 MCU state report (%d bytes)", payload_len);
              uint16_t pos = 6;
              while (pos + 4 < full_len) {
                uint8_t dp_id   = buf[pos];
                uint8_t dp_type = buf[pos+1];
                uint16_t dp_len = (buf[pos+2] << 8) | buf[pos+3];
                if (pos + 4 + dp_len > full_len) break;
                uint8_t dp_val  = buf[pos+4];
                // DP25 = lock state
                if (dp_id == 0x19 && dp_len >= 1) {
                  bool locked = (dp_val == 0x01);
                  id(feeder_locked) = locked;
                  id(lock_sensor).publish_state(locked ? "Locked" : "Unlocked");
                  ESP_LOGD("tuya", "CMD02 lock state: %s", locked ? "LOCKED" : "UNLOCKED");
                }
                pos += 4 + dp_len;
              }
              if ("${mqtt_debug}" == std::string("true"))
                mqtt::global_mqtt_client->publish(std::string("${topic_prefix}/debug"), std::string("CMD02 MCU state report parsed"), 0, false);
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x03 WiFi status query from MCU ──────────────────────
            // MCU asks us to resend WiFi status, e.g. after a reconnect.
            // Reply with the same frame we send during handshake: cloud connected (0x04).
            if (cmd == 0x03) {
              uint8_t wifi_status[] = {0x55, 0xAA, 0x00, 0x03, 0x00, 0x01, 0x04, 0x07};
              id(tuya_uart).write_array(wifi_status, sizeof(wifi_status));
              ESP_LOGD("tuya", "CMD03 WiFi status query — replied cloud connected");
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x07 DP status report ────────────────────────────────
            // Payload: [dp_id][dp_type][val_len_hi][val_len_lo][val...]
            if (cmd == 0x07 && payload_len >= 5 && buf.size() >= 7u + payload_len) {
              uint8_t dp_id    = buf[6];
              uint8_t dp_type  = buf[7];
              uint16_t val_len = (buf[8] << 8) | buf[9];
              uint8_t dp_val   = buf[10];  // first value byte (bool/enum)
              // For 4-byte integers (type 0x02) read the full value
              uint32_t dp_val32 = 0;
              if (dp_type == 0x02 && val_len == 4 && buf.size() >= 14u) {
                dp_val32 = ((uint32_t)buf[10] << 24) | ((uint32_t)buf[11] << 16) |
                           ((uint32_t)buf[12] <<  8) |  (uint32_t)buf[13];
              }

              if ("${mqtt_debug}" == std::string("true")) {
                char msg[72];
                if (dp_type == 0x02 && val_len == 4)
                  snprintf(msg, sizeof(msg), "CMD07 DP%d type=0x%02X val32=%u", dp_id, dp_type, dp_val32);
                else
                  snprintf(msg, sizeof(msg), "CMD07 DP%d type=0x%02X val=0x%02X", dp_id, dp_type, dp_val);
                mqtt::global_mqtt_client->publish(std::string("${topic_prefix}/debug"), std::string(msg), 0, false);
              }
              if (dp_type == 0x02 && val_len == 4)
                ESP_LOGI("tuya", "CMD07 DP%d type=0x%02X val32=%u", dp_id, dp_type, dp_val32);
              else
                ESP_LOGI("tuya", "CMD07 DP%d type=0x%02X val=0x%02X", dp_id, dp_type, dp_val);

              // DP4 (0x04) = feeding motor state: 0x00=idle/done
              if (dp_id == 0x04 && dp_val == 0x00) {
                if (id(feeding_active)) {
                  id(feeding_active) = false;
                  id(feeder_sensor).publish_state("Idle");
                  ESP_LOGI("tuya", "Feeding done — DP4=0");
                  uint8_t ack[] = {0x55, 0xAA, 0x00, 0x34, 0x00, 0x02, 0x0B, 0x00, 0x40};
                  id(tuya_uart).write_array(ack, sizeof(ack));
                  ESP_LOGD("tuya", "CMD34 DP11 ack sent to MCU (DP4 path)");
                }
                if (!id(mcu_ready)) {
                  id(mcu_ready) = true;
                  ESP_LOGD("tuya", "MCU ready — motor controller initialised (DP4=0)");
                }
              }

              // DP25 (0x19) = lock state from physical button
              if (dp_id == 0x19) {
                bool locked = (dp_val == 0x01);
                id(feeder_locked) = locked;
                id(lock_sensor).publish_state(locked ? "Locked" : "Unlocked");
                ESP_LOGI("tuya", "Lock: %s", locked ? "LOCKED" : "UNLOCKED");
              }

              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x08 MCU ack ─────────────────────────────────────────
            if (cmd == 0x08) {
              ESP_LOGV("tuya", "CMD08 ack from MCU");
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x1C Time sync request (MCU → ESP) ──────────────────
            // The MCU sends CMD 0x1C to request the current Unix timestamp.
            // We respond with CMD 0x1C back (same command, ESP→MCU direction).
            // Format: 55 AA 00 1C 00 08 [4-byte unix time BE] [hour offset] [min offset] [checksum]
            if (cmd == 0x1C) {
              auto now = id(sntp_time).now();
              if (now.is_valid()) {
                uint32_t unix_time = (uint32_t)now.timestamp;
                uint8_t resp[13] = {
                  0x55, 0xAA, 0x00, 0x1C, 0x00, 0x08,
                  (uint8_t)(unix_time >> 24),
                  (uint8_t)(unix_time >> 16),
                  (uint8_t)(unix_time >>  8),
                  (uint8_t)(unix_time),
                  0x00,  // UTC hour offset
                  0x00,  // UTC minute offset
                  0x00   // checksum placeholder
                };
                uint8_t cs = 0;
                for (int i = 0; i < 12; i++) cs += resp[i];
                resp[12] = cs;
                id(tuya_uart).write_array(resp, 13);
                ESP_LOGV("tuya", "CMD1C time sync: unix=%u cs=0x%02X", unix_time, cs);
              } else {
                // SNTP not yet synced — send zeroed time, MCU will retry
                uint8_t resp[] = {0x55, 0xAA, 0x00, 0x1C, 0x00, 0x08, 0,0,0,0, 0,0, 0x23};
                id(tuya_uart).write_array(resp, sizeof(resp));
                ESP_LOGV("tuya", "CMD1C time sync: SNTP not ready, sending zero");
              }
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── CMD 0x34 Extended feeding log ────────────────────────────
            // Sent after feed completes. Contains DP11 record with timestamp.
            if (cmd == 0x34 && payload_len >= 2) {
              uint8_t dp_id = buf[6];
              if ("${mqtt_debug}" == std::string("true")) {
                char msg[48];
                snprintf(msg, sizeof(msg), "CMD34 DP%d extended report", dp_id);
                mqtt::global_mqtt_client->publish(std::string("${topic_prefix}/debug"), std::string(msg), 0, false);
              }
              ESP_LOGI("tuya", "CMD34 DP%d extended report", dp_id);
              if (dp_id == 0x0B && id(feeding_active)) {
                id(feeding_active) = false;
                id(feeder_sensor).publish_state("Idle");
                ESP_LOGI("tuya", "Feeding done — CMD34 DP11");
                // Ack the feed completion back to MCU — WBR3 always sends this
                // after every feed. Without it the MCU may refuse the next
                // UART feed command after ~24h (requires physical button to wake).
                uint8_t ack[] = {0x55, 0xAA, 0x00, 0x34, 0x00, 0x02, 0x0B, 0x00, 0x40};
                id(tuya_uart).write_array(ack, sizeof(ack));
                ESP_LOGD("tuya", "CMD34 DP11 ack sent to MCU");
              }
              buf.erase(buf.begin(), buf.begin() + full_len);
              continue;
            }

            // ── Unknown ──────────────────────────────────────────────────
            if ("${mqtt_debug}" == std::string("true")) {
              char msg[48];
              snprintf(msg, sizeof(msg), "Unknown CMD 0x%02X len=%d", cmd, payload_len);
              mqtt::global_mqtt_client->publish(std::string("${topic_prefix}/debug"), std::string(msg), 0, false);
            }
            ESP_LOGW("tuya", "Unknown CMD 0x%02X len=%d", cmd, payload_len);
            buf.erase(buf.begin(), buf.begin() + full_len);
          }
